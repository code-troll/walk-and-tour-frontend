      security:
        - admin-auth: []
      summary: Unpublish a tour translation
      tags:
        - Admin Tours
info:
  title: Walk and Tour Backend API
  description: Administrative and public API surface for languages, tags, tours, blog posts, and admin authentication.
  version: 1.0.0
  contact: {}
tags: []
servers: []
components:
  securitySchemes:
    admin-auth:
      scheme: bearer
      bearerFormat: JWT
      type: http
      description: Auth0-issued bearer token required by protected admin endpoints.
  schemas:
    AuthenticatedAdminResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Local admin UUID.
          format: uuid
        email:
          type: string
          description: Authenticated admin email.
          example: editor@example.com
        roleName:
          type: string
          description: Resolved local role of the authenticated admin.
          enum:
            - super_admin
            - editor
            - marketing
        status:
          type: string
          description: Lifecycle status of the authenticated admin.
          enum:
            - invited
            - active
            - disabled
        auth0UserId:
          type: string
          description: Bearer token subject issued by Auth0.
          example: auth0|abc123
      required:
        - id
        - email
        - roleName
        - status
        - auth0UserId
    ErrorResponseDto:
      type: object
      properties:
        statusCode:
          type: number
          description: HTTP status code returned by NestJS for the failed request.
          example: 400
        message:
          description: Validation or domain error details. NestJS may return a string or a list of strings.
          oneOf:
            - type: string
              example: Validation failed
            - type: array
              items:
                type: string
              example:
                - slug must match /^[a-z0-9]+(?:-[a-z0-9]+)*$/
        error:
          type: string
          description: NestJS exception name.
          example: Bad Request
      required:
        - statusCode
        - message
        - error
    LogoutResponseDto:
      type: object
      properties:
        logoutStrategy:
          type: string
          description: Logout strategy expected by the frontend. Tokens are bearer tokens and must be discarded client-side.
          example: client_discard_bearer_token
      required:
        - logoutStrategy
    AdminMediaAssetResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Media asset UUID.
          format: uuid
        mediaType:
          type: string
          description: Stored media type.
          enum:
            - image
            - video
          example: image
        storagePath:
          type: string
          description: Media storage path.
          example: media/tours/historic-center/cover.jpg
        contentUrl:
          type: string
          description: API URL used to fetch the stored media bytes.
          example: http://api.dev.walkandtour.dk:3000/api/admin/media/uuid/content
        contentType:
          type: string
          description: Detected content type of the uploaded object.
          example: image/jpeg
        size:
          type: number
          description: Stored file size in bytes.
          example: 248193
        originalFilename:
          type: string
          description: Original uploaded filename.
          example: cover.jpg
        createdAt:
          type: string
          description: Creation timestamp of the media asset record.
          format: date-time
        updatedAt:
          type: string
          description: Last update timestamp of the media asset record.
          format: date-time
      required:
        - id
        - mediaType
        - storagePath
        - contentUrl
        - contentType
        - size
        - originalFilename
        - createdAt
        - updatedAt
    AdminMediaAssetListResponseDto:
      type: object
      properties:
        items:
          description: Paginated media asset results.
          type: array
          items:
            $ref: "#/components/schemas/AdminMediaAssetResponseDto"
        page:
          type: number
          description: Current page number.
          example: 1
        limit:
          type: number
          description: Current page size.
          example: 20
        total:
          type: number
          description: Total matching media assets.
          example: 42
      required:
        - items
        - page
        - limit
        - total
    UploadedMediaResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Media asset UUID.
          format: uuid
        mediaType:
          type: string
          description: Stored media type.
          enum:
            - image
            - video
          example: image
        storagePath:
          type: string
          description: Media storage path.
          example: media/tours/historic-center/cover.jpg
        contentUrl:
          type: string
          description: API URL used to fetch the stored media bytes.
          example: http://api.dev.walkandtour.dk:3000/api/admin/media/uuid/content
        contentType:
          type: string
          description: Detected content type of the uploaded object.
          example: image/jpeg
        size:
          type: number
          description: Stored file size in bytes.
          example: 248193
        originalFilename:
          type: string
          description: Original uploaded filename.
          example: cover.jpg
      required:
        - id
        - mediaType
        - storagePath
        - contentUrl
        - contentType
        - size
        - originalFilename
    RoleResponseDto:
      type: object
      properties:
        name:
          type: string
          description: Stable role name used by route guards.
          enum:
            - super_admin
            - editor
            - marketing
          example: super_admin
        description:
          type: string
          description: Human-readable explanation of the role.
          example: Full administrative access to backoffice management endpoints.
        permissions:
          description: Permission identifiers attached to the role record.
          example:
            - admin.users.manage
            - content.publish
          type: array
          items:
            type: string
        createdAt:
          type: string
          description: Creation timestamp.
          format: date-time
        updatedAt:
          type: string
          description: Last update timestamp.
          format: date-time
      required:
        - name
        - description
        - permissions
        - createdAt
        - updatedAt
    AdminUserResponseDto:
      type: object
      properties:
        id:
          type: string
          description: Admin user UUID.
          format: uuid
        auth0UserId:
          type: object
          description: Mapped Auth0 subject, if already linked.
          example: auth0|abc123
          nullable: true
        email:
          type: string
          description: Normalized admin email address.
          example: admin@example.com
        roleName:
          type: string
          description: Assigned role name.
          enum:
            - super_admin
            - editor
            - marketing
        role:
          description: Expanded role record.
          allOf:
            - $ref: "#/components/schemas/RoleResponseDto"
        status:
          type: string
          description: Lifecycle state of the admin user.
          enum:
            - invited
            - active
            - disabled
        createdAt:
          type: string
          description: Creation timestamp.
          format: date-time
        updatedAt:
          type: string
          description: Last update timestamp.
          format: date-time
        lastLoginAt:
          type: string
          description: Last successful authenticated login timestamp.
          format: date-time
          nullable: true
      required:
        - id
        - email
        - roleName
        - role
        - status
        - createdAt
        - updatedAt
    CreateAdminUserDto:
      type: object
      properties:
        email:
          type: string
          description: Email address used to identify the local admin user.
          example: admin@example.com
        roleName:
          type: string
          description: Role assigned to the new admin user.
          enum:
            - super_admin
            - editor
