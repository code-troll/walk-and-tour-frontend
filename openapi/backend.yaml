    CreateTourDto:
      type: object
      properties:
        name:
          type: string
          description: Non-localized admin-facing name used to identify the tour.
          example: Barcelona Historic Center Main Tour
          minLength: 1
          maxLength: 255
        slug:
          type: string
          description: Stable public slug for the tour.
          example: historic-center
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
          maxLength: 150
        tourType:
          type: string
          description: Commercial model of the tour. Required during minimal creation.
          enum:
            - private
            - group
            - tip_based
            - company
          example: group
      required:
        - name
        - slug
        - tourType
    PriceDto:
      type: object
      properties:
        amount:
          type: number
          description: Fixed price amount. Only valid for non-tip-based tours.
          example: 25
          minimum: 0
        currency:
          type: string
          description: Currency code paired with the fixed amount.
          example: EUR
          maxLength: 10
      required:
        - amount
        - currency
    TourCoordinatesDto:
      type: object
      properties:
        lat:
          type: number
          description: Latitude in decimal degrees.
          example: 41.3874
        lng:
          type: number
          description: Longitude in decimal degrees.
          example: 2.1686
      required:
        - lat
        - lng
    SharedPointDto:
      type: object
      properties:
        coordinates:
          description: Optional shared coordinates for the point.
          allOf:
            - $ref: "#/components/schemas/TourCoordinatesDto"
    TourItineraryConnectionDto:
      type: object
      properties:
        durationMinutes:
          type: number
          description: Travel time in minutes to the next stop.
          example: 8
          minimum: 0
        commuteMode:
          type: string
          description: Commute mode used to move to the next stop.
          enum:
            - walk
            - bike
            - bus
            - train
            - metro
            - tram
            - ferry
            - private-transport
            - boat
            - other
          example: walk
      required:
        - commuteMode
    TourItineraryStopDto:
      type: object
      properties:
        id:
          type: string
          description: Stable stop identifier shared across translations.
          example: stop-1
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
          maxLength: 100
        durationMinutes:
          type: number
          description: Duration spent at the stop in minutes.
          example: 15
          minimum: 0
        coordinates:
          description: Optional stop coordinates.
          allOf:
            - $ref: "#/components/schemas/TourCoordinatesDto"
        nextConnection:
          description: Transport information to the next stop. The final stop must omit this field.
          allOf:
            - $ref: "#/components/schemas/TourItineraryConnectionDto"
      required:
        - id
    TourItineraryDto:
      type: object
      properties:
        variant:
          type: string
          description: Whether the itinerary is modeled as a localized description or shared ordered stops.
          enum:
            - description
            - stops
          example: description
        stops:
          description: Ordered shared stop list. Required when `variant` is `stops` and forbidden for `description` itineraries.
          type: array
          items:
            $ref: "#/components/schemas/TourItineraryStopDto"
      required:
        - variant
    UpdateTourDto:
      type: object
      properties:
        name:
          type: string
          description: Updated non-localized admin-facing name.
          example: Barcelona Historic Center Main Tour
          minLength: 1
          maxLength: 255
        slug:
          type: string
          description: Updated public slug.
          example: historic-center
          pattern: ^[a-z0-9]+(?:-[a-z0-9]+)*$
          maxLength: 150
        contentSchema:
          type: object
          description: Updated shared JSON Schema for localized payload validation.
          additionalProperties: true
        price:
          description: Updated fixed price. Set `null` to remove price data.
          nullable: true
          allOf:
            - $ref: "#/components/schemas/PriceDto"
        rating:
          type: number
          description: Updated average rating.
          example: 4.9
          minimum: 1
          maximum: 5
        reviewCount:
          type: number
          description: Updated review count.
          example: 135
          minimum: 0
        tourType:
          type: string
          description: Updated commercial model.
          enum:
            - private
            - group
            - tip_based
            - company
          example: group
        durationMinutes:
          type: number
          description: Updated duration in minutes.
          example: 150
          minimum: 0
        startPoint:
          description: Replacement shared start point metadata.
          allOf:
            - $ref: "#/components/schemas/SharedPointDto"
        endPoint:
          description: Replacement shared end point metadata.
          allOf:
            - $ref: "#/components/schemas/SharedPointDto"
        itinerary:
