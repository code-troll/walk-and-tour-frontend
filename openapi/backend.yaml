            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Delete a tour translation
      tags:
        - Admin Tours
  /api/admin/tours/{id}/translations/{languageCode}/publish:
    post:
      description: >-
        Publishes one localized tour translation. This endpoint is the only place where translation publication can be
        enabled, and it rejects translations that are not ready.
      operationId: ToursController_publishTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Tour UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
