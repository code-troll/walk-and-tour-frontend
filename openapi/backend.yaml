                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Update a tour translation
      tags:
        - Admin Tours
    delete:
      description: Deletes one localized tour translation by locale code. This permanently removes the locale from the tour.
      operationId: ToursController_deleteTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Tour UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
          description: Translation locale code.
