openapi: 3.0.0
paths:
  /api/admin/auth/me:
    get:
      description: Resolves the authenticated Auth0 bearer token to the local admin user context used by guarded admin routes.
      operationId: AdminAuthController_me
      parameters: []
      responses:
        "200":
          description: Resolved authenticated admin context.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthenticatedAdminResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Get the current authenticated admin
      tags:
        - Admin Auth
  /api/admin/auth/logout:
    post:
      description: The backend uses bearer tokens, so logout is handled by the client discarding the current token.
      operationId: AdminAuthController_logout
      parameters: []
      responses:
        "200":
          description: Logout handling instructions.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogoutResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Describe admin logout behavior
      tags:
        - Admin Auth
  /api/admin/media:
    get:
      description: Returns paginated reusable media assets for the admin media library.
      operationId: AdminMediaController_findAll
      parameters:
        - name: page
          required: false
          in: query
          description: Pagination page number.
          schema:
            minimum: 1
            example: 1
            type: number
        - name: limit
          required: false
          in: query
          description: Pagination page size.
          schema:
            minimum: 1
            maximum: 100
            example: 20
            type: number
        - name: mediaType
          required: false
          in: query
          description: Optional media type filter.
          schema:
            enum:
              - image
              - video
            type: string
        - name: search
          required: false
          in: query
          description: Optional filename/path search term.
          schema:
            maxLength: 100
            example: historic-center
            type: string
      responses:
        "200":
          description: Paginated media asset records.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMediaAssetListResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: List media assets
      tags:
        - Admin Media
    post:
      description: >-
        Uploads one image or video through the configured storage driver and returns a persisted reusable media asset
        descriptor.
      operationId: AdminMediaController_upload
      parameters: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                folder:
                  type: string
                  example: tours/historic-center
              required:
                - file
      responses:
        "201":
          description: Stored media asset descriptor.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadedMediaResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Upload a media asset for admin content
      tags:
        - Admin Media
  /api/admin/media/{id}:
    get:
      description: Returns one reusable media asset by UUID.
      operationId: AdminMediaController_findOne
      parameters:
        - name: id
          required: true
          in: path
          description: Media asset UUID.
          schema:
            format: uuid
            type: string
      responses:
        "200":
          description: Media asset record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminMediaAssetResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Get a media asset
      tags:
        - Admin Media
    delete:
      description: Deletes an uploaded media asset and its stored object when it is no longer referenced by any tour.
      operationId: AdminMediaController_remove
      parameters:
        - name: id
          required: true
          in: path
          description: Media asset UUID.
          schema:
            format: uuid
            type: string
      responses:
        "204":
          description: Media asset deleted.
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Delete a media asset
      tags:
        - Admin Media
  /api/admin/media/{id}/content:
    get:
      description: Streams the stored file bytes for one reusable media asset.
      operationId: AdminMediaController_fetchContent
      parameters:
        - name: id
          required: true
          in: path
          description: Media asset UUID.
          schema:
            format: uuid
            type: string
      responses:
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Fetch media content
      tags:
        - Admin Media
  /api/admin/users:
    get:
      description: Returns all local admin users with their expanded role records.
      operationId: AdminUsersController_findAll
      parameters: []
      responses:
        "200":
          description: Admin users.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUserResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: List admin users
      tags:
        - Admin Users
    post:
      description: Creates a local admin user record that can later authenticate through Auth0 mapping.
      operationId: AdminUsersController_create
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminUserDto"
      responses:
        "201":
          description: Created admin user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Create an admin user
      tags:
        - Admin Users
  /api/admin/users/{id}:
    patch:
      description: Updates email, role, Auth0 mapping, or status of an existing local admin user.
      operationId: AdminUsersController_update
      parameters:
        - name: id
          required: true
          in: path
          description: Admin user UUID.
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAdminUserDto"
      responses:
        "200":
          description: Updated admin user.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUserResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Update an admin user
      tags:
        - Admin Users
  /api/admin/roles:
    get:
      description: Returns the local role catalog used by admin route authorization.
      operationId: RolesController_findAll
      parameters: []
      responses:
        "200":
          description: Available admin roles.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RoleResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: List admin roles
      tags:
        - Admin Roles
  /api/admin/blog-posts:
    get:
      description: Returns all blog posts with localized translation maps, public availability diagnostics, and audit metadata.
      operationId: BlogPostsController_findAllAdmin
      parameters: []
      responses:
        "200":
          description: Admin blog post records.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BlogAdminResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: List blog posts for admin management
      tags:
        - BlogPosts
        - Admin Blog Posts
    post:
      description: >-
        Creates a minimal blog draft with shared identifier fields. Localized translations are added later through the
        nested translation routes.
      operationId: BlogPostsController_createAdmin
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogPostDto"
      responses:
        "201":
          description: Created admin blog post record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Create a blog post
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}:
    get:
      description: Returns the full admin representation of a single blog post.
      operationId: BlogPostsController_findOneAdmin
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
      responses:
        "200":
          description: Admin blog post record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Get a blog post by UUID for admin management
      tags:
        - BlogPosts
        - Admin Blog Posts
    patch:
      description: Updates only shared blog data on the base blog post record.
      operationId: BlogPostsController_updateAdmin
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogPostDto"
      responses:
        "200":
          description: Updated admin blog post record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Update a blog post
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}/translations:
    post:
      description: >-
        Creates one localized blog translation independently from the shared blog post. New translations always start
        unpublished.
      operationId: BlogPostsController_createTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlogPostTranslationDto"
      responses:
        "201":
          description: Admin blog post record after translation creation.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Create a blog post translation
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}/translations/{languageCode}:
    patch:
      description: >-
        Updates one localized blog translation independently from the shared blog post. If the translation stops being
        publishable, it is automatically unpublished.
      operationId: BlogPostsController_updateTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
          description: Locale code for the translation.
          schema:
            example: en
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBlogPostTranslationDto"
      responses:
        "200":
          description: Admin blog post record after translation update.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "409":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Update a blog post translation
      tags:
        - BlogPosts
        - Admin Blog Posts
    delete:
      description: Deletes one localized blog translation by locale code.
      operationId: BlogPostsController_deleteTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
          description: Locale code for the translation.
          schema:
            example: en
            type: string
      responses:
        "204":
          description: Translation deleted successfully.
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Delete a blog post translation
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}/translations/{languageCode}/publish:
    post:
      description: >-
        Publishes one localized blog translation. This endpoint is the only place where translation publication can be
        enabled manually.
      operationId: BlogPostsController_publishTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
          description: Locale code for the translation.
          schema:
            example: en
            type: string
      responses:
        "200":
          description: Admin blog post record after translation publication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Publish a blog post translation
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}/translations/{languageCode}/unpublish:
    post:
      description: >-
        Unpublishes one localized blog translation. This endpoint is the only place where translation publication can be
        disabled manually.
      operationId: BlogPostsController_unpublishTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
          description: Locale code for the translation.
          schema:
            example: en
            type: string
      responses:
        "200":
          description: Admin blog post record after translation unpublication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: Unpublish a blog post translation
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}/media:
    get:
      description: Returns the hero media attached to the blog post, if any.
      operationId: BlogPostsController_listAdminMedia
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
      responses:
        "200":
          description: Attached blog media assets.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogMediaListResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
      security:
        - admin-auth: []
      summary: List attached blog media
      tags:
        - BlogPosts
        - Admin Blog Posts
  /api/admin/blog-posts/{id}/hero-media:
    post:
      description: Attaches or replaces the hero media on the blog post.
      operationId: BlogPostsController_setHeroMedia
      parameters:
        - name: id
          required: true
          in: path
          description: Blog post UUID.
          schema:
            format: uuid
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetBlogPostHeroMediaDto"
      responses:
        "200":
          description: Updated admin blog post record.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BlogAdminResponseDto"
        "400":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
