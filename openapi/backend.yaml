      tags:
        - Admin Tours
  /api/admin/tours/{id}/translations/{languageCode}/unpublish:
    post:
      description: >-
        Unpublishes one localized tour translation. This endpoint is the only place where translation publication can be
        disabled manually.
      operationId: ToursController_unpublishTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Tour UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
          in: path
          description: Translation locale code.
          schema:
            example: en
            type: string
      responses:
        "200":
          description: Admin tour record after translation unpublication.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TourAdminResponseDto"
        "401":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "403":
          description: ""
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponseDto"
        "404":
          description: ""
          content:
            application/json:
              schema:
