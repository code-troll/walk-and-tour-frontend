        Updates one localized tour translation independently from shared tour data. Any readiness recalculation that
        fails will automatically unpublish that translation.
      operationId: ToursController_updateTranslation
      parameters:
        - name: id
          required: true
          in: path
          description: Tour UUID.
          schema:
            format: uuid
            type: string
        - name: languageCode
          required: true
